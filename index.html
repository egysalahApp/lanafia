                    {
                        q: "في جملة (سننتصر لا محالةَ). كلمة (محالة) تُعرب:",

                        isTF: false,
                        choices: [
                            { text: "اسم لا مبني على الفتح في محل نصب.", correct: true },
                            { text: "مضافًا إليه مجرورًا بالكسرة.", correct: false },
                            { text: "خبر لا مرفوعًا بالضمة.", correct: false }
                        ],
                        explanation: "الكلمات (محالة، بد، شك، مفر) من الثوابت التي تُعرب اسم لا مفرد مبني على الفتح، وخبرها يكون محذوفًا تقديره (في ذلك)."

                ]

        ];

        /**
         * 2. حالة التطبيق
         */
        let currentSectionIndex = 0;
        let userProgress = {}; 

        const arabicNumerals = ['١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩', '١٠'];

        // منع المتصفح من الاحتفاظ بموضع التمرير عند تحديث الصفحة (محمي للبيئات المعزولة)
        try {
            if ('scrollRestoration' in window.history) {
                window.history.scrollRestoration = 'manual';
            }
        } catch (e) {
            // تجاهل الخطأ في حال كانت البيئة (Iframe) تمنع الوصول للـ history
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.scrollTo(0, 0); // إجبار الصفحة على البدء من الأعلى دائمًا
            initProgressObj();
            renderTabs();
            loadSection(0, true);
            setupGlobalListeners();
        });

        // دالة جديدة لخلط اختيارات القسم مرة واحدة فقط
        function shuffleSectionQuestions(sec) {
            sec.questions.forEach(q => {
                if (q.choices && !q.isTF) {
                    shuffleArray(q.choices);
                }
                // حفظ ترتيب عشوائي ثابت لبطاقات نشاط التوصيل
                if (q.type === 'matching') {
                    let rItems = q.pairs.map((p, i) => ({ text: p.right, pairId: i }));
                    let lItems = q.pairs.map((p, i) => ({ text: p.left, pairId: i }));
                    q.shuffledRight = shuffleArray(rItems);
                    q.shuffledLeft = shuffleArray(lItems);
                }
            });
        }

        function initProgressObj() {
            userProgress = {};
            window.hintState = {}; // حفظ حالة التلميحات للاستقلالية وعدم الإغلاق القسري
            window.lastAnsweredQId = null; // لتتبع السؤال الأخير وتشغيل الشفافية عليه فقط
            courseData.forEach(sec => {
                if (!sec.isSummary) {
                    userProgress[sec.id] = {};
                    shuffleSectionQuestions(sec); // خلط الاختيارات مرة واحدة عند التحميل
                }
            });
        }

        function smoothScrollToContent() {
            requestAnimationFrame(() => {
                const scrollTarget = document.getElementById('main-lesson-title-container');
                const stickyTabs = document.getElementById('sticky-tabs');
                if (!scrollTarget || !stickyTabs) return;
                const tabsHeight = stickyTabs.offsetHeight;
                const rect = scrollTarget.getBoundingClientRect();
                const offsetPosition = rect.top + window.pageYOffset - tabsHeight - 20;
                window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
            });
        }

        function centerActiveTab() {
            requestAnimationFrame(() => {
                const container = document.getElementById('tabs-container');
                const activeTab = document.querySelector('.tab-btn.active-tab');
                if (!container || !activeTab) return;
                const containerWidth = container.clientWidth;
                const tabWidth = activeTab.clientWidth;
                const tabLeft = activeTab.offsetLeft;
                const scrollPos = tabLeft - (containerWidth / 2) + (tabWidth / 2);
                container.scrollTo({ left: scrollPos, behavior: 'smooth' });
            });
        }

        function renderTabs() {
            const tabsList = document.getElementById('tabs-list');
            tabsList.innerHTML = '';
            courseData.forEach((sec, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <button onclick="loadSection(${index})" 
                            class="tab-btn px-5 py-2 rounded-full text-xl font-bold transition-all duration-300 whitespace-nowrap outline-none no-select flex items-center justify-center gap-1">
                        <span>${sec.title}</span>
                        <span class="tab-icon-container"></span>
                    </button>
                `;
                tabsList.appendChild(li);
            });
            updateTabsUI();
        }

        function updateTabsUI() {
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach((btn, index) => {
                const sec = courseData[index];
                const isCompleted = isSectionCompleted(sec.id);
                const iconContainer = btn.querySelector('.tab-icon-container');
                
                if (isCompleted && !sec.isSummary) {
                    iconContainer.innerHTML = `
                        <svg class="w-6 h-6 text-emerald-500 fade-in" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                            <circle cx="12" cy="12" r="10" stroke-width="2"></circle>
                        </svg>
                    `;
                } else {
                    iconContainer.innerHTML = '';
                }

                if (index === currentSectionIndex) {
                    btn.classList.add('bg-blue-600', 'text-white', 'active-tab', 'shadow-md');
                    btn.classList.remove('text-slate-500', 'bg-transparent');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white', 'active-tab', 'shadow-md');
                    btn.classList.add('text-slate-500', 'bg-transparent');
                }
            });
            updateProgressBar();
            setTimeout(centerActiveTab, 50);
        }

        function updateProgressBar() {
            const progressBar = document.getElementById('progress-bar');
            const sec = courseData[currentSectionIndex];
            
            if (sec.isSummary) {
                progressBar.style.width = '100%';
                progressBar.className = 'h-full transition-all duration-500 w-0 right-0 absolute bg-blue-500';
            } else {
                const total = sec.questions.length;
                const answered = Object.keys(userProgress[sec.id] || {}).length;
                const percentage = (answered / total) * 100;
                progressBar.style.width = `${percentage}%`;
                if (percentage === 100) progressBar.className = 'h-full transition-all duration-500 w-0 right-0 absolute bg-emerald-500';
                else progressBar.className = 'h-full transition-all duration-500 w-0 right-0 absolute bg-amber-500';
            }
        }

        function loadSection(index, preventScroll = false) {
            currentSectionIndex = index;
            const section = courseData[index];
            
            const contentArea = document.getElementById('content-area');
            const navButtons = document.getElementById('navigation-buttons');
            const finalArea = document.getElementById('final-result-area');
            
            // القاعدة 2: حركات الدخول الانزلاقية عند التنقل بين الأقسام فقط 
            if (!preventScroll) {
                contentArea.classList.remove('fade-in');
                void contentArea.offsetWidth; 
                contentArea.classList.add('fade-in');
            }
            finalArea.classList.add('hidden');

            if (section.isSummary) {
                contentArea.innerHTML = section.content;
                navButtons.classList.add('hidden');
            } else {
                renderQuestions(section);
                navButtons.classList.remove('hidden');
                const btnNext = document.getElementById('btn-next');
                if (index === courseData.length - 1) btnNext.classList.add('hidden');
                else btnNext.classList.remove('hidden');
            }

            updateTabsUI();
            if (!preventScroll) setTimeout(smoothScrollToContent, 50);
            checkGlobalCompletion();
        }

        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function renderQuestions(section) {
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = '';
            const answeredState = userProgress[section.id] || {};

            section.questions.forEach((q, qIndex) => {
                const qId = `q_${section.id}_${qIndex}`;
                const isAnswered = answeredState.hasOwnProperty(qIndex);
                const isCorrect = isAnswered ? answeredState[qIndex] : null;

                // التحقق من حالة التلميح (حسب القاعدة 3: لا نغلق العناصر المفتوحة)
                if (!window.hintState) window.hintState = {};
                const isHintOpen = window.hintState[qId] === true;
                const hintHiddenClass = isHintOpen ? '' : 'hidden';

                const qCard = document.createElement('div');
                qCard.className = `mb-12`; 
                
                let activityBadge = '';
                if (q.type === 'word-hunter') {
                    activityBadge = `<span class="text-blue-600 bg-blue-50 px-3 py-1 rounded-full text-xl border border-blue-100 hidden sm:inline-block">صياد الكلمات 🎯</span>`;
                } else if (q.type === 'card-sorting') {
                    activityBadge = `<span class="text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full text-xl border border-indigo-100 hidden sm:inline-block">تصنيف البطاقات 🗂️</span>`;
                } else if (q.type === 'matching') {
                    activityBadge = `<span class="text-fuchsia-600 bg-fuchsia-50 px-3 py-1 rounded-full text-xl border border-fuchsia-100 hidden sm:inline-block">نشاط التوصيل 🔗</span>`;
                }

                // بناء ترويسة وسؤال صندوق كل سؤال
                let html = `
                    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border ${isAnswered ? (isCorrect ? 'border-emerald-300 bg-emerald-50/20' : 'border-rose-300 bg-rose-50/20') : 'border-pastel-200'} mb-4 transition-colors duration-300">
                        
                        <!-- الترويسة العلوية: رقم السؤال والتلميح -->
                        <div class="flex justify-between items-center mb-3">
                            <div class="flex items-center gap-3">
                                <span class="inline-flex items-center justify-center px-4 py-1.5 rounded-xl bg-slate-100 text-slate-700 font-bold text-xl md:text-2xl shadow-sm border border-slate-200">السؤال ${arabicNumerals[qIndex]}</span>
                                ${activityBadge}
                            </div>
                            <button onclick="toggleHint('${qId}')" class="flex items-center gap-1 text-amber-500 hover:text-amber-600 bg-amber-50 hover:bg-amber-100 px-4 py-2 rounded-full text-xl font-bold transition-colors border border-amber-200 shadow-sm">
                                <span>تلميح</span> <span class="text-2xl">💡</span>
                            </button>
                        </div>
                        
                        <!-- نص السؤال: تم إزالة الهامش السفلي mb-0 لتقليل الفراغ الزائد داخل الصندوق -->
                        <h3 class="text-xl md:text-2xl font-bold text-slate-800 text-right leading-snug mb-0">${q.q}</h3>
                        
                        <!-- صندوق التلميح: تم نقل الهامش ليكون بالجهة العلوية mt-4 -->
                        <div id="hint_${qId}" class="${hintHiddenClass} bg-amber-50 text-amber-900 p-4 rounded-xl text-xl md:text-2xl text-right border border-amber-200 shadow-sm mt-4 mb-0">
                            <strong>💡 تلميح: </strong> ${q.hint}
                        </div>
                    </div>
                `;

                // بناء واجهة الإجابات بناءً على نوع النشاط
                if (q.type === 'word-hunter') {
                    html += `<div class="mx-auto max-w-lg w-full text-center bg-white p-8 rounded-2xl shadow-sm border border-slate-200 mb-6 leading-loose text-2xl md:text-3xl" dir="rtl">`;
                    
                    q.words.forEach((word, wIndex) => {
                        let isCorrectWord = (wIndex === q.correctIndex);
                        let btnClass = "inline-block mx-1 px-3 py-2 font-bold rounded-xl cursor-pointer transition-all duration-300 ";
                        
                        if (!isAnswered) {
                            btnClass += "bg-slate-100 text-slate-700 hover:bg-blue-100 hover:text-blue-700 hover:-translate-y-1 shadow-sm";
                        } else {
                            if (isCorrectWord) {
                                btnClass += "bg-emerald-500 text-white shadow-md transform scale-110";
                            } else {
                                btnClass += "bg-slate-50 text-slate-300 cursor-default line-through";
                            }
                        }
                        
                        let disabledAttr = isAnswered ? "disabled" : "";
                        html += `<button ${disabledAttr} onclick="handleAnswer('${section.id}', ${qIndex}, ${isCorrectWord})" class="${btnClass}">${word}</button> `;
                    });
                    
                    html += `</div>`;
                } else if (q.type === 'card-sorting') {
                    html += `
                        <div class="flex justify-center my-6 px-2 fade-opacity">
                            <div class="bg-indigo-50 border-4 border-indigo-200 text-indigo-900 px-8 py-10 rounded-3xl shadow-md text-2xl md:text-3xl font-bold text-center w-full max-w-lg relative overflow-hidden">
                                <div class="absolute top-0 right-0 w-full h-3 bg-indigo-400"></div>
                                <div class="absolute top-4 right-4 opacity-50 text-2xl">📌</div>
                                ${q.cardText}
                            </div>
                        </div>
                        <div class="flex flex-col gap-4 mx-auto max-w-lg w-full mt-6 mb-4">
                    `;
                    
                    let displayChoices = q.choices; // تم الخلط مسبقاً في التهيئة ولن تتغير

                    displayChoices.forEach((choice, cIndex) => {
                        let btnClass = "w-full text-center p-5 rounded-2xl border-2 border-dashed border-slate-300 bg-slate-50 shadow-sm text-xl md:text-2xl text-slate-700 hover:border-indigo-400 hover:bg-indigo-50 hover:border-solid hover:-translate-y-1 transition-all cursor-pointer font-bold";
                        let disabledAttr = isAnswered ? "disabled" : "";
                        
                        if (isAnswered) {
                            btnClass = "w-full text-center p-5 rounded-2xl border-2 border-solid text-xl md:text-2xl cursor-default opacity-90 shadow-sm font-bold";
                            if (choice.correct) btnClass += " border-emerald-500 bg-emerald-100 text-emerald-900";
                            else btnClass += " border-slate-200 bg-white text-slate-400 line-through";
                        }

                        html += `
                            <button ${disabledAttr} onclick="handleAnswer('${section.id}', ${qIndex}, ${choice.correct})" class="${btnClass}">
                                ${choice.text}
                            </button>
                        `;
                    });
                    html += `</div>`;
                } else if (q.type === 'matching') {
                    // تحديد العرض الأقصى بـ max-w-3xl لضمان الامتثال التام لقاعدة الحجم
                    html += `<div class="mx-auto w-full max-w-3xl mt-6 mb-4">`;
                    
                    if (isAnswered) {
                        let rightItems = q.pairs.map((p, i) => ({ text: p.right, pairId: i }));
                        let leftItems = q.pairs.map((p, i) => ({ text: p.left, pairId: i }));
                        html += `<div class="flex flex-col gap-4">`;
                        for(let i=0; i<rightItems.length; i++) {
                            html += `
                                <div class="flex flex-col md:flex-row gap-2 md:gap-4 items-stretch">
                                    <div class="w-full md:w-1/2 p-4 rounded-xl border-2 border-emerald-500 bg-emerald-100 text-emerald-900 font-bold text-center text-xl md:text-2xl shadow-sm flex items-center justify-center min-h-[5rem]">
                                        ${rightItems[i].text}
                                    </div>
                                    <div class="hidden md:flex items-center justify-center text-emerald-500 text-3xl">🔗</div>
                                    <div class="flex md:hidden items-center justify-center text-emerald-500 text-3xl rotate-90">🔗</div>
                                    <div class="w-full md:w-1/2 p-4 rounded-xl border-2 border-emerald-500 bg-emerald-100 text-emerald-900 font-bold text-center text-xl md:text-2xl shadow-sm flex items-center justify-center min-h-[5rem]">
                                        ${leftItems[i].text}
                                    </div>
                                </div>
                            `;
                        }
                        html += `</div>`;
                    } else {
                        let rightItems = q.shuffledRight; // استخدام الترتيب العشوائي الثابت
                        let leftItems = q.shuffledLeft; // استخدام الترتيب العشوائي الثابت
                        
                        html += `<div class="flex flex-col md:flex-row gap-4 md:gap-8 relative">`;
                        
                        html += `<div class="flex flex-col gap-4 w-full md:w-1/2">`;
                        rightItems.forEach((rItem, i) => {
                            html += `<button id="btn_${qId}_r_${i}" onclick="handleMatchSelection(this, 'right', '${qId}', ${rItem.pairId}, '${section.id}', ${qIndex}, ${q.pairs.length})" class="p-4 rounded-xl border-2 border-slate-300 bg-white text-slate-700 font-bold text-center text-xl md:text-2xl shadow-sm hover:border-fuchsia-400 hover:bg-fuchsia-50 transition-all cursor-pointer min-h-[5rem] flex items-center justify-center leading-relaxed">${rItem.text}</button>`;
                        });
                        html += `</div>`;

                        html += `<div class="flex flex-col gap-4 w-full md:w-1/2">`;
                        leftItems.forEach((lItem, i) => {
                            html += `<button id="btn_${qId}_l_${i}" onclick="handleMatchSelection(this, 'left', '${qId}', ${lItem.pairId}, '${section.id}', ${qIndex}, ${q.pairs.length})" class="p-4 rounded-xl border-2 border-slate-300 bg-white text-slate-700 font-bold text-center text-xl md:text-2xl shadow-sm hover:border-fuchsia-400 hover:bg-fuchsia-50 transition-all cursor-pointer min-h-[5rem] flex items-center justify-center leading-relaxed">${lItem.text}</button>`;
                        });
                        html += `</div>`;
                        
                        html += `</div>`;
                        
                        if (!window.matchState) window.matchState = {};
                        // عدم تصفير الحالة في حالة وجودها مسبقاً
                        if (!window.matchState[qId]) window.matchState[qId] = { right: null, left: null, matchedCount: 0 };
                    }
                    html += `</div>`;
                } else {
                    let displayChoices = q.choices; // تم الخلط مسبقاً في التهيئة ولن تتغير

                    html += `<div class="flex flex-col gap-3 mx-auto max-w-lg w-full mb-4">`;
                    displayChoices.forEach((choice, cIndex) => {
                        const numLabel = q.isTF ? '' : `<span class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-slate-100 text-slate-600 font-bold ml-3 text-xl flex-shrink-0">${arabicNumerals[cIndex]}</span>`;
                        let btnClass = "w-full text-right p-4 rounded-xl border-2 border-slate-200 bg-white shadow-sm text-xl md:text-2xl text-slate-700 hover:border-blue-400 hover:bg-blue-50 transition-all flex items-center cursor-pointer";
                        let disabledAttr = isAnswered ? "disabled" : "";
                        
                        if (isAnswered) {
                            btnClass = "w-full text-right p-4 rounded-xl border-2 text-xl md:text-2xl flex items-center cursor-default opacity-90 shadow-sm";
                            if (choice.correct) btnClass += " border-emerald-500 bg-emerald-100 text-emerald-900 font-bold";
                            else btnClass += " border-slate-200 bg-white text-slate-500";
                        }

                        html += `
                            <button ${disabledAttr} onclick="handleAnswer('${section.id}', ${qIndex}, ${choice.correct})" class="${btnClass}">
                                ${numLabel}
                                <span>${choice.text}</span>
                            </button>
                        `;
                    });
                    html += `</div>`;
                }

                // صندوق التغذية الراجعة وفقاً للقاعدة 1 (الشفافية فقط لمنع الاهتزاز)
                if (isAnswered) {
                    const feedbackTitle = isCorrect ? '✅ إجابة صحيحة' : '❌ إجابة خاطئة';
                    const feedbackColor = isCorrect ? 'text-emerald-800 bg-emerald-50 border-emerald-300' : 'text-rose-800 bg-rose-50 border-rose-300';
                    
                    // منع إعادة حركة الظهور للأسئلة القديمة (تطبيق الشفافية على السؤال الحالي فقط)
                    const isJustAnswered = window.lastAnsweredQId === qId;
                    const animClass = isJustAnswered ? 'fade-opacity' : '';

                    html += `
                        <div class="mx-auto w-full max-w-lg mt-4 ${animClass}">
                            <div class="p-6 rounded-xl border-2 ${feedbackColor} text-right shadow-sm">
                                <h4 class="font-bold text-xl md:text-2xl mb-3">${feedbackTitle}</h4>
                                <p class="text-xl md:text-2xl leading-relaxed opacity-90 text-slate-800">${q.explanation}</p>
                            </div>
                        </div>
                    `;
                }

                qCard.innerHTML = html;
                contentArea.appendChild(qCard);
            });

            if (isSectionCompleted(section.id)) showSectionResult(section);
        }

        // دالة التبديل لصندوق التلميحات وتخزين الحالة
        window.toggleHint = function(qId) {
            if (!window.hintState) window.hintState = {};
            const hintDiv = document.getElementById(`hint_${qId}`);
            if (hintDiv) {
                if (hintDiv.classList.contains('hidden')) {
                    hintDiv.classList.remove('hidden');
                    
                    // تشغيل حركة الظهور السلسة (Fade) فقط عند النقر لفتحه
                    hintDiv.classList.remove('fade-opacity');
                    void hintDiv.offsetWidth; // إجبار المتصفح على قراءة التغيير لتشغيل الحركة
                    hintDiv.classList.add('fade-opacity');
                    
                    window.hintState[qId] = true; // حفظ الحالة مفتوح
                } else {
                    hintDiv.classList.add('hidden');
                    hintDiv.classList.remove('fade-opacity'); // تنظيف الكلاس عند الإغلاق
                    window.hintState[qId] = false; // حفظ الحالة مغلق
                }
            }
        }

        // دالة التحكم في نشاط التوصيل
        window.handleMatchSelection = function(btn, side, qId, pairId, sectionId, qIndex, totalPairs) {
            if (!window.matchState) window.matchState = {};
            if (!window.matchState[qId]) window.matchState[qId] = { right: null, left: null, matchedCount: 0 };

            let state = window.matchState[qId];

            if (state[side] && state[side].btn === btn) {
                btn.classList.remove('ring-4', 'ring-fuchsia-400', 'bg-fuchsia-50');
                state[side] = null;
                return;
            }

            if (state[side]) {
                state[side].btn.classList.remove('ring-4', 'ring-fuchsia-400', 'bg-fuchsia-50');
            }

            btn.classList.add('ring-4', 'ring-fuchsia-400', 'bg-fuchsia-50');
            state[side] = { btn: btn, pairId: pairId };

            if (state.right && state.left) {
                if (state.right.pairId === state.left.pairId) {
                    [state.right.btn, state.left.btn].forEach(b => {
                        b.classList.remove('ring-4', 'ring-fuchsia-400', 'bg-fuchsia-50', 'hover:border-fuchsia-400', 'hover:bg-fuchsia-50', 'cursor-pointer', 'border-slate-300');
                        b.classList.add('bg-emerald-100', 'border-emerald-500', 'text-emerald-900', 'opacity-90');
                        b.disabled = true;
                    });

                    state.matchedCount++;
                    state.right = null;
                    state.left = null;

                    if (state.matchedCount === totalPairs) {
                        const currentQId = `q_${sectionId}_${qIndex}`;
                        window.lastAnsweredQId = currentQId;
                        setTimeout(() => handleAnswer(sectionId, qIndex, true), 600);
                    }
                } else {
                    let rBtn = state.right.btn;
                    let lBtn = state.left.btn;
                    
                    [rBtn, lBtn].forEach(b => {
                        b.classList.remove('ring-4', 'ring-fuchsia-400', 'bg-fuchsia-50');
                        b.classList.add('bg-rose-100', 'border-rose-500', 'text-rose-900');
                    });

                    state.right = null;
                    state.left = null;

                    setTimeout(() => {
                        [rBtn, lBtn].forEach(b => {
                            b.classList.remove('bg-rose-100', 'border-rose-500', 'text-rose-900');
                        });
                    }, 600);
                }
            }
        }

        window.handleAnswer = function(sectionId, qIndex, isCorrect) {
            const qId = `q_${sectionId}_${qIndex}`;
            
            // تسجيل هذا السؤال كآخر سؤال تمت إجابته (لتطبيق الثبات البصري وتفعيل وميض التغذية الراجعة عليه فقط)
            window.lastAnsweredQId = qId;

            if (!userProgress[sectionId]) userProgress[sectionId] = {};
            userProgress[sectionId][qIndex] = isCorrect;

            const secIndex = courseData.findIndex(s => s.id === sectionId);
            loadSection(secIndex, true); 
        }

        window.goToNextSection = function() {
            if (currentSectionIndex < courseData.length - 1) loadSection(currentSectionIndex + 1);
        }

        function setupGlobalListeners() {
            document.getElementById('btn-next').addEventListener('click', () => goToNextSection());
            
            document.getElementById('btn-retry').addEventListener('click', () => {
                const secId = courseData[currentSectionIndex].id;
                userProgress[secId] = {}; 
                shuffleSectionQuestions(courseData[currentSectionIndex]); // خلط جديد عند النقر على إعادة المحاولة
                
                // تصفير حالة التوصيل للقسم الحالي حتى يعمل التوصيل مجدداً
                if (window.matchState) {
                    courseData[currentSectionIndex].questions.forEach((q, qIndex) => {
                        const qId = `q_${secId}_${qIndex}`;
                        if (window.matchState[qId]) {
                            window.matchState[qId] = { right: null, left: null, matchedCount: 0 };
                        }
                    });
                }

                loadSection(currentSectionIndex, true); 
                smoothScrollToContent(); 
            });

            document.getElementById('btn-restart-all').addEventListener('click', () => {
                initProgressObj();
                window.matchState = {}; // تصفير شامل لجميع حالات التوصيل
                renderTabs(); 
                loadSection(0, true); 
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        function isSectionCompleted(sectionId) {
            const sec = courseData.find(s => s.id === sectionId);
            if (sec.isSummary) return true;
            const answered = Object.keys(userProgress[sectionId] || {}).length;
            return answered === sec.questions.length;
        }

        function showSectionResult(section) {
            const contentArea = document.getElementById('content-area');
            const answers = Object.values(userProgress[section.id]);
            const correctCount = answers.filter(v => v === true).length;
            const total = section.questions.length;
            
            let msg = correctCount === total ? "أداء مبهر! ممتاز جدًا 🌟" : 
                      correctCount >= total/2 ? "أداء جيد، يمكنك إعادة المحاولة لتحسين نتيجتك 👍" : 
                      "لا بأس، راجع القاعدة وأعد المحاولة 💪";

            const resultHTML = `
                <div class="mt-8 p-8 bg-blue-50 rounded-2xl border-2 border-blue-200 text-center fade-opacity">
                    <h3 class="text-2xl md:text-3xl font-bold text-slate-800 mb-4">نتيجة قسم (${section.title})</h3>
                    <div class="text-4xl md:text-5xl font-bold text-blue-600 mb-4" dir="ltr">
                        ${correctCount} / ${total}
                    </div>
                    <p class="text-xl md:text-2xl text-slate-700 font-medium">${msg}</p>
                </div>
            `;
            contentArea.insertAdjacentHTML('beforeend', resultHTML);
        }

        function checkGlobalCompletion() {
            const sectionsWithQuestions = courseData.filter(s => !s.isSummary);
            const allCompleted = sectionsWithQuestions.every(s => isSectionCompleted(s.id));

            if (allCompleted) {
                const finalArea = document.getElementById('final-result-area');
                finalArea.classList.remove('hidden');
                
                let totalCorrect = 0, totalQuestions = 0;
                sectionsWithQuestions.forEach(sec => {
                    const answers = Object.values(userProgress[sec.id]);
                    totalCorrect += answers.filter(v => v === true).length;
                    totalQuestions += sec.questions.length;
                });

                const percentage = (totalCorrect / totalQuestions) * 100;
                
                const msgs100 = ["أنت عبقري في النحو! لقد أتقنت درس (لا النافية للجنس) بشكل كامل. 👑", "علامة كاملة! أداء استثنائي يثبت تفوقك. 🏆", "مذهل! لا يوجد سؤال استعصى عليك، أنت أستاذ في هذا الدرس! 🌟"];
                const msgs80 = ["رائع جدًا! مستوى متقدم وفهم عميق للقاعدة. استمر! 🌟", "ممتاز! تقترب من الكمال، مجرد هفوات بسيطة. 👍", "أداء قوي جدًا! أنت تملك ناصية النحو. 👏"];
                const msgs60 = ["جهد طيب! لقد فهمت الأساسيات، وقليل من المراجعة سيجعلك متمكنًا. 📚", "جيد! أنت على الطريق الصحيح، واصل التدريب. 🛤️", "لا بأس! تحتاج لبعض التركيز الإضافي لتصل للقمة. 🧗"];
                const msgsLow = ["لا تقلق، النحو يحتاج إلى تدريب مستمر. حاول مرة أخرى وستلاحظ التحسن! 💪", "كل خطأ هو فرصة للتعلم! أعد المحاولة وستتجاوزها. 🔄", "البدايات قد تكون صعبة، لكن الاستمرار يصنع النجاح! 🌱"];

                let finalMsg = percentage === 100 ? msgs100[Math.floor(Math.random() * msgs100.length)] : 
                               percentage >= 80 ? msgs80[Math.floor(Math.random() * msgs80.length)] : 
                               percentage >= 60 ? msgs60[Math.floor(Math.random() * msgs60.length)] : 
                               msgsLow[Math.floor(Math.random() * msgsLow.length)];

                document.getElementById('final-message').textContent = finalMsg;
                document.getElementById('final-score-text').textContent = `${totalCorrect} / ${totalQuestions}`;
                
                setTimeout(() => {
                    requestAnimationFrame(() => {
                        const stickyTabs = document.getElementById('sticky-tabs');
                        const tabsHeight = stickyTabs ? stickyTabs.offsetHeight : 0;
                        const rect = finalArea.getBoundingClientRect();
                        const offsetPosition = rect.top + window.pageYOffset - tabsHeight - 20;
                        window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
                    });
                }, 300);
            }
        }
    </script>
</body>
</html>

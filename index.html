        /**
         * 2. حالة التطبيق (State Management)
         */
        let currentSectionIndex = 0;
        // تخزين إجابات المستخدم: { sectionId: { questionIndex: true/false } }
        let userProgress = {}; 
        
        // الأرقام العربية للترقيم
        const arabicNumerals = ['١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩', '١٠'];

        /**
         * 3. التهيئة الأساسية (Initialization)
         */
        document.addEventListener('DOMContentLoaded', () => {
            initProgressObj();
            renderTabs();
            // تمرير true لمنع التمرير التلقائي للأسفل عند بداية تحميل التطبيق
            loadSection(0, true);
            setupGlobalListeners();
        });

        function initProgressObj() {
            userProgress = {};
            courseData.forEach(sec => {
                if (!sec.isSummary) {
                    userProgress[sec.id] = {};
                }
            });
        }

        /**
         * 4. دوال التمرير الاحترافي (Scrolling Logic)
         */
        
        // التمرير العمودي الناعم والآمن للمحتوى
        function smoothScrollToContent() {
            requestAnimationFrame(() => {
                const contentArea = document.getElementById('content-area');
                const stickyTabs = document.getElementById('sticky-tabs');
                
                if (!contentArea || !stickyTabs) return;

                const tabsHeight = stickyTabs.offsetHeight;
                const rect = contentArea.getBoundingClientRect();
                
                // حساب المسافة بدقة مع إضافة هامش صغير 20px وطرح ارتفاع التبويبات الثابتة
                const offsetPosition = rect.top + window.pageYOffset - tabsHeight - 20;

                window.scrollTo({
                    top: offsetPosition,
                    behavior: 'smooth'
                });
            });
        }

        // التمرير الأفقي الآمن للتبويبات (يتوافق مع RTL)
        function centerActiveTab() {
            requestAnimationFrame(() => {
                const container = document.getElementById('tabs-container');
                const activeTab = document.querySelector('.tab-btn.active-tab');
                
                if (!container || !activeTab) return;

                // حساب موقع الزر بالنسبة للحاوية
                const containerWidth = container.clientWidth;
                const tabWidth = activeTab.clientWidth;
                
                // في RTL، المتصفحات تتعامل مع scrollLeft بطرق مختلفة.
                // الطريقة الأكثر أمانًا هي حساب المسافة من اليمين.
                // clientLeft أو offsetLeft قد تكون غير موثوقة في RTL، لكننا سنستخدم المنطق الرياضي لمركزة العنصر.
                
                const tabLeft = activeTab.offsetLeft;
                const scrollPos = tabLeft - (containerWidth / 2) + (tabWidth / 2);

                container.scrollTo({
                    left: scrollPos,
                    behavior: 'smooth'
                });
            });
        }

        /**
         * 5. بناء واجهة المستخدم (UI Rendering)
         */
        
        function renderTabs() {
            const tabsList = document.getElementById('tabs-list');
            tabsList.innerHTML = '';

            courseData.forEach((sec, index) => {
                const li = document.createElement('li');
                
                li.innerHTML = `
                    <button onclick="loadSection(${index})" 
                            class="tab-btn px-5 py-2 rounded-full text-lg md:text-xl font-bold transition-all duration-300 whitespace-nowrap outline-none no-select flex items-center justify-center gap-1">
                        <span>${sec.title}</span>
                        <span class="tab-icon-container"></span>
                    </button>
                `;
                tabsList.appendChild(li);
            });
            updateTabsUI();
        }

        function updateTabsUI() {
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach((btn, index) => {
                const sec = courseData[index];
                const isCompleted = isSectionCompleted(sec.id);
                const iconContainer = btn.querySelector('.tab-icon-container');
                
                // إضافة علامة الصح فور اكتمال القسم (باستثناء قسم المقدمة)
                if (isCompleted && !sec.isSummary) {
                    iconContainer.innerHTML = `
                        <svg class="w-5 h-5 text-emerald-500 fade-in" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                            <circle cx="12" cy="12" r="10" stroke-width="2"></circle>
                        </svg>
                    `;
                } else {
                    iconContainer.innerHTML = ''; // إزالتها في حالة تصفير القسم أو إذا كان قسم مقدمة
                }

                if (index === currentSectionIndex) {
                    btn.classList.add('bg-blue-600', 'text-white', 'active-tab', 'shadow-md');
                    btn.classList.remove('text-slate-500', 'bg-transparent');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white', 'active-tab', 'shadow-md');
                    btn.classList.add('text-slate-500', 'bg-transparent');
                }
            });
            updateProgressBar();
            
            // استخدام setTimeout قصير لضمان تحديث DOM قبل التمرير الأفقي
            setTimeout(centerActiveTab, 50);
        }

        function updateProgressBar() {
            const progressBar = document.getElementById('progress-bar');
            const sec = courseData[currentSectionIndex];
            
            if (sec.isSummary) {
                progressBar.style.width = '100%';
                progressBar.className = 'h-full transition-all duration-500 w-0 right-0 absolute bg-blue-500';
            } else {
                const total = sec.questions.length;
                const answered = Object.keys(userProgress[sec.id] || {}).length;
                const percentage = (answered / total) * 100;
                progressBar.style.width = `${percentage}%`;
                
                // تغيير اللون إذا اكتمل
                if (percentage === 100) {
                    progressBar.className = 'h-full transition-all duration-500 w-0 right-0 absolute bg-emerald-500';
                } else {
                    progressBar.className = 'h-full transition-all duration-500 w-0 right-0 absolute bg-amber-500';
                }
            }
        }

        function loadSection(index, preventScroll = false) {
            currentSectionIndex = index;
            const section = courseData[index];
            
            // تحديث العناوين
            document.getElementById('section-title').textContent = section.title;
            document.getElementById('section-subtitle').textContent = section.isSummary ? "مقدمة وتمهيد" : "أجب عن الأسئلة التالية لاختبار فهمك";
            
            const contentArea = document.getElementById('content-area');
            const navButtons = document.getElementById('navigation-buttons');
            const finalArea = document.getElementById('final-result-area');
            
            // إعادة ضبط الأنيميشن
            contentArea.classList.remove('fade-in');
            void contentArea.offsetWidth; // Trigger reflow
            contentArea.classList.add('fade-in');

            finalArea.classList.add('hidden');

            if (section.isSummary) {
                contentArea.innerHTML = section.content;
                navButtons.classList.add('hidden');
            } else {
                renderQuestions(section);
                navButtons.classList.remove('hidden');
                
                // تحديث حالة زر القسم التالي
                const btnNext = document.getElementById('btn-next');
                if (index === courseData.length - 1) {
                    btnNext.classList.add('hidden'); // إخفاء في القسم الأخير
                } else {
                    btnNext.classList.remove('hidden');
                }
            }

            updateTabsUI();
            
            // التمرير العمودي للمحتوى فقط إذا لم يتم منعه
            if (!preventScroll) {
                setTimeout(smoothScrollToContent, 50);
            }
            
            checkGlobalCompletion();
        }

        /**
         * 6. منطق الأسئلة (Questions Logic)
         */

        // دالة خلط المصفوفات (Fisher-Yates)
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function renderQuestions(section) {
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = '';
            
            const answeredState = userProgress[section.id] || {};

            section.questions.forEach((q, qIndex) => {
                const qId = `q_${section.id}_${qIndex}`;
                const isAnswered = answeredState.hasOwnProperty(qIndex);
                const isCorrect = isAnswered ? answeredState[qIndex] : null;

                // تحضير الاختيارات (خلط إذا لم تكن صح/خطأ، ولم تتم الإجابة بعد)
                // نحتفظ بنفس ترتيب الخلط إذا أجاب الطالب حتى لا تتغير أماكنها أمامه
                let displayChoices = [...q.choices];
                
                // ملاحظة: لتبسيط التطبيق والحفاظ على حالة الخلط دون تعقيد التخزين،
                // سنقوم بخلطها فقط إذا لم يتم الرد، وإذا تم الرد سنرتبها بناء على ما تم حفظه لو أردنا حفظ الترتيب،
                // لكن الأفضل تربويًا إعادة الخلط عند إعادة المحاولة فقط.
                // هنا سنقوم بالخلط إذا لم تكن صح/خطأ.
                if (!q.isTF) {
                    // نستخدم seeded random بسيط أو ببساطة نخلطها دائمًا عند الريندر، 
                    // وبما أن الريندر يحدث عند تغيير التبويب، فستتغير. هذا مطلوب لعدم الحفظ المكاني.
                    displayChoices = shuffleArray(displayChoices);
                }

                // بناء كود HTML للسؤال
                const qCard = document.createElement('div');
                qCard.className = `mb-12 transition-all duration-300`; // تم إزالة الخلفية البيضاء من الحاوية الرئيسية لفصل العناصر
                
                let html = `
                    <!-- صندوق السؤال -->
                    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border ${isAnswered ? (isCorrect ? 'border-emerald-300 bg-emerald-50/30' : 'border-rose-300 bg-rose-50/30') : 'border-pastel-200'} mb-4">
                        
                        <!-- الترويسة العلوية للسؤال (رقم السؤال يمين + زر التلميح يسار) -->
                        <div class="flex justify-between items-center mb-5 pb-4 border-b border-slate-100">
                            <span class="text-lg md:text-xl font-bold text-slate-500">السؤال ${arabicNumerals[qIndex]}</span>
                            <button onclick="toggleHint('${qId}')" class="flex items-center gap-1 text-amber-600 hover:text-amber-700 bg-amber-50 hover:bg-amber-100 px-4 py-1.5 rounded-full text-sm md:text-base font-bold transition-colors border border-amber-200">
                                <span>تلميح</span> <span class="text-lg">💡</span>
                            </button>
                        </div>

                        <!-- نص السؤال -->
                        <h3 class="text-xl md:text-2xl font-bold text-slate-800 text-right leading-relaxed">
                            ${q.q}
                        </h3>
                    </div>
                    
                    <!-- صندوق نص التلميح -->
                    <div id="hint_${qId}" class="hidden mx-auto max-w-2xl w-full mb-6 bg-amber-100 text-amber-900 p-4 rounded-xl text-lg md:text-xl text-right border border-amber-200 fade-in shadow-sm">
                        <strong>💡 تلميح: </strong> ${q.hint}
                    </div>

                    <!-- صندوق الاختيارات (مستقل عن السؤال) -->
                    <div class="flex flex-col gap-3 mx-auto max-w-xl w-full">
                `;

                displayChoices.forEach((choice, cIndex) => {
                    // الترقيم: لا ترقيم لصح/خطأ
                    const numLabel = q.isTF ? '' : `<span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-slate-100 text-slate-600 font-bold ml-3 text-lg flex-shrink-0">${arabicNumerals[cIndex]}</span>`;
                    
                    // تحديد حالة الزر إذا كان مجاباً (تمت إضافة bg-white و shadow-sm لتبدو كصناديق منفصلة)
                    let btnClass = "w-full text-right p-4 rounded-xl border-2 border-slate-200 bg-white shadow-sm text-xl md:text-2xl text-slate-700 hover:border-blue-400 hover:bg-blue-50 transition-all flex items-center cursor-pointer";
                    
                    let disabledAttr = isAnswered ? "disabled" : "";
                    
                    // إظهار الإجابة الصحيحة والخاطئة إذا كان السؤال مجاباً
                    if (isAnswered) {
                        btnClass = "w-full text-right p-4 rounded-xl border-2 text-xl md:text-2xl flex items-center cursor-default opacity-90 shadow-sm";
                        if (choice.correct) {
                            btnClass += " border-emerald-500 bg-emerald-100 text-emerald-900 font-bold";
                        } else {
                            btnClass += " border-slate-200 bg-white text-slate-500";
                        }
                    }

                    html += `
                        <button ${disabledAttr} onclick="handleAnswer('${section.id}', ${qIndex}, ${choice.correct})" class="${btnClass}">
                            ${numLabel}
                            <span>${choice.text}</span>
                        </button>
                    `;
                });

                html += `</div>`; // إغلاق حاوية الاختيارات

                // منطقة التغذية الراجعة والشرح (صندوق مستقل أسفل الاختيارات)
                if (isAnswered) {
                    const feedbackTitle = isCorrect ? '✅ إجابة صحيحة' : '❌ إجابة تحتاج مراجعة';
                    const feedbackColor = isCorrect ? 'text-emerald-700 bg-emerald-100 border-emerald-200' : 'text-rose-700 bg-rose-100 border-rose-200';
                    
                    html += `
                        <div class="mx-auto max-w-xl w-full mt-4 p-5 rounded-xl border ${feedbackColor} text-right fade-in shadow-sm">
                            <h4 class="font-bold text-xl md:text-2xl mb-2">${feedbackTitle}</h4>
                            <p class="text-lg md:text-xl leading-relaxed">${q.explanation}</p>
                        </div>
                    `;
                }

                qCard.innerHTML = html;
                contentArea.appendChild(qCard);
            });

            // عرض نتيجة القسم إذا اكتمل
            if (isSectionCompleted(section.id)) {
                showSectionResult(section);
            }
        }

        /**
         * 7. التفاعل (Interactions & Events)
         */

        function toggleHint(qId) {
            const hintDiv = document.getElementById(`hint_${qId}`);
            if (hintDiv.classList.contains('hidden')) {
                hintDiv.classList.remove('hidden');
            } else {
                hintDiv.classList.add('hidden');
            }
        }

        // دالة يتم استدعاؤها من واجهة المستخدم (onclick)
        window.handleAnswer = function(sectionId, qIndex, isCorrect) {
            if (!userProgress[sectionId]) userProgress[sectionId] = {};
            
            // تسجيل الإجابة
            userProgress[sectionId][qIndex] = isCorrect;
            
            // إعادة تصيير القسم لتحديث الواجهة مع منع التمرير للأعلى
            const secIndex = courseData.findIndex(s => s.id === sectionId);
            loadSection(secIndex, true); 
        }

        // الانتقال للقسم التالي المبرمج في التبويبات
        window.goToNextSection = function() {
            if (currentSectionIndex < courseData.length - 1) {
                loadSection(currentSectionIndex + 1);
            }
        }

        function setupGlobalListeners() {
            document.getElementById('btn-next').addEventListener('click', () => {
                goToNextSection();
            });

            document.getElementById('btn-retry').addEventListener('click', () => {
                const secId = courseData[currentSectionIndex].id;
                userProgress[secId] = {}; // تصفير القسم
                loadSection(currentSectionIndex); // إعادة التحميل
            });

            document.getElementById('btn-restart-all').addEventListener('click', () => {
                initProgressObj();
                renderTabs(); // تحديث وإزالة الأيقونات من التبويبات
                loadSection(0, true); // العودة للمقدمة مع منع التمرير الافتراضي للقسم
                
                // التمرير السلس لأعلى الصفحة تماماً (للترويسة)
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        /**
         * 8. الحسابات والنتائج (Scoring & Completion)
         */

        function isSectionCompleted(sectionId) {
            const sec = courseData.find(s => s.id === sectionId);
            if (sec.isSummary) return true;
            
            const answered = Object.keys(userProgress[sectionId] || {}).length;
            return answered === sec.questions.length;
        }

        function showSectionResult(section) {
            const contentArea = document.getElementById('content-area');
            const answers = Object.values(userProgress[section.id]);
            const correctCount = answers.filter(v => v === true).length;
            const total = section.questions.length;
            
            let msg = correctCount === total ? "أداء مبهر! ممتاز جدًا 🌟" : 
                      correctCount >= total/2 ? "أداء جيد، يمكنك إعادة المحاولة لتحسين نتيجتك 👍" : 
                      "لا بأس، راجع القاعدة وأعد المحاولة 💪";

            const resultHTML = `
                <div class="mt-8 p-8 bg-blue-50 rounded-2xl border-2 border-blue-200 text-center fade-in">
                    <h3 class="text-2xl md:text-3xl font-bold text-slate-800 mb-4">نتيجة قسم (${section.title})</h3>
                    <div class="text-4xl md:text-5xl font-bold text-blue-600 mb-4" dir="ltr">
                        ${correctCount} / ${total}
                    </div>
                    <p class="text-xl md:text-2xl text-slate-700 font-medium">${msg}</p>
                </div>
            `;
            
            contentArea.insertAdjacentHTML('beforeend', resultHTML);
        }

        function checkGlobalCompletion() {
            // التحقق مما إذا كانت جميع الأقسام التي تحتوي على أسئلة قد اكتملت
            const sectionsWithQuestions = courseData.filter(s => !s.isSummary);
            const allCompleted = sectionsWithQuestions.every(s => isSectionCompleted(s.id));

            if (allCompleted) {
                const finalArea = document.getElementById('final-result-area');
                finalArea.classList.remove('hidden');
                
                // حساب المجموع الكلي
                let totalCorrect = 0;
                let totalQuestions = 0;
                
                sectionsWithQuestions.forEach(sec => {
                    const answers = Object.values(userProgress[sec.id]);
                    totalCorrect += answers.filter(v => v === true).length;
                    totalQuestions += sec.questions.length;
                });

                const percentage = (totalCorrect / totalQuestions) * 100;
                
                // عبارات تحفيزية متغيرة يتم اختيارها عشوائياً بناءً على النسبة
                const msgs100 = [
                    "أنت عبقري في النحو! لقد أتقنت درس (لا النافية للجنس) بشكل كامل. 👑",
                    "علامة كاملة! أداء استثنائي يثبت تفوقك. 🏆",
                    "مذهل! لا يوجد سؤال استعصى عليك، أنت أستاذ في هذا الدرس! 🌟"
                ];
                const msgs80 = [
                    "رائع جدًا! مستوى متقدم وفهم عميق للقاعدة. استمر! 🌟",
                    "ممتاز! تقترب من الكمال، مجرد هفوات بسيطة. 👍",
                    "أداء قوي جدًا! أنت تملك ناصية النحو. 👏"
                ];
                const msgs60 = [
                    "جهد طيب! لقد فهمت الأساسيات، وقليل من المراجعة سيجعلك متمكنًا. 📚",
                    "جيد! أنت على الطريق الصحيح، واصل التدريب. 🛤️",
                    "لا بأس! تحتاج لبعض التركيز الإضافي لتصل للقمة. 🧗"
                ];
                const msgsLow = [
                    "لا تقلق، النحو يحتاج إلى تدريب مستمر. حاول مرة أخرى وستلاحظ التحسن! 💪",
                    "كل خطأ هو فرصة للتعلم! أعد المحاولة وستتجاوزها. 🔄",
                    "البدايات قد تكون صعبة، لكن الاستمرار يصنع النجاح! 🌱"
                ];

                let finalMsg = "";
                if (percentage === 100) finalMsg = msgs100[Math.floor(Math.random() * msgs100.length)];
                else if (percentage >= 80) finalMsg = msgs80[Math.floor(Math.random() * msgs80.length)];
                else if (percentage >= 60) finalMsg = msgs60[Math.floor(Math.random() * msgs60.length)];
                else finalMsg = msgsLow[Math.floor(Math.random() * msgsLow.length)];

                document.getElementById('final-message').textContent = finalMsg;
                document.getElementById('final-score-text').textContent = `${totalCorrect} / ${totalQuestions}`;
                
                // التمرير إلى النتيجة النهائية
                setTimeout(() => {
                    requestAnimationFrame(() => {
                        const stickyTabs = document.getElementById('sticky-tabs');
                        const tabsHeight = stickyTabs ? stickyTabs.offsetHeight : 0;
                        const rect = finalArea.getBoundingClientRect();
                        
                        // طرح ارتفاع التبويبات الثابتة حتى لا تُغطي النتيجة
                        const offsetPosition = rect.top + window.pageYOffset - tabsHeight - 20;
                        window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
                    });
                }, 300);
            }
        }

    </script>
</body>
</html>
